! ---------------------------------------------------------------------------
! UDM-SE BGP config (FRRouting). Upload via UniFi Network GUI:
!   Settings -> Routing -> BGP -> Upload Configuration  (Network app 8.x+)
!
! Router ASN 65000  <->  Cluster ASN 65001
! Peers = Talos nodes on 10.0.10.0/24. Single L2 hop (no ebgp-multihop).
! Re-upload after Network-app upgrades — UniFi can clobber custom FRR.
! Verify on UDM:  vtysh -c "show bgp summary"   (want state = Established)
! ---------------------------------------------------------------------------
frr defaults traditional
log syslog informational
!
router bgp 65000
 bgp router-id 10.0.10.1
 ! eBGP drops routes without this on FRR >= 7.4 — required.
 no bgp ebgp-requires-policy
 !
 neighbor talos peer-group
 neighbor talos remote-as 65001
 neighbor 10.0.10.201 peer-group talos
 neighbor 10.0.10.202 peer-group talos
 neighbor 10.0.10.203 peer-group talos
 neighbor 10.0.10.205 peer-group talos
 !
 address-family ipv4 unicast
  neighbor talos activate
  neighbor talos soft-reconfiguration inbound
  ! ECMP across multiple speakers (real load balancing).
  maximum-paths 4
 exit-address-family
!
line vty
!
