# Blog — Astro SSR site (https://github.com/LoneExile/blog).
# Stateless; no PVC needed.
#
# Routed via blog.apinant.dev. apinant.dev isn't covered by the *.home.0dl.me
# wildcard cert, so bind to the :80 listener — Cloudflare Tunnel terminates
# TLS at the edge (same pattern as memos-tunnel).

apiVersion: v1
kind: Namespace
metadata:
  name: blog
  labels:
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: blog
  namespace: blog
  labels: {app: blog}
spec:
  replicas: 1
  selector:
    matchLabels: {app: blog}
  template:
    metadata:
      labels: {app: blog}
    spec:
      containers:
        - name: blog
          # Pinned by digest. The user-provided digest was the arm64 variant
          # of `:latest`; this is the amd64 variant of the same multi-arch tag.
          image: loneexile/blog@sha256:acf49dfa570731aa5619d8460ebb4d37aa6105443b1b99329149f6fc0b4aecad
          ports:
            - {name: http, containerPort: 4321}
          env:
            - {name: TZ, value: Asia/Bangkok}
            - {name: HOST, value: 0.0.0.0}
            - {name: PORT, value: "4321"}
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            runAsGroup: 1001
            allowPrivilegeEscalation: false
            capabilities: {drop: [ALL]}
            seccompProfile: {type: RuntimeDefault}
          resources:
            requests: {cpu: 20m, memory: 64Mi}
            limits:   {cpu: 500m, memory: 256Mi}
          readinessProbe:
            httpGet: {path: /, port: http}
            initialDelaySeconds: 5
          livenessProbe:
            httpGet: {path: /, port: http}
            initialDelaySeconds: 30
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: blog
  namespace: blog
  labels: {app: blog}
spec:
  type: ClusterIP
  selector: {app: blog}
  ports:
    - {name: http, port: 4321, targetPort: http}
---
# Tunnel route — blog.apinant.dev via Cloudflare Tunnel. HTTP-only (the
# wildcard cert covers *.home.0dl.me, not this hostname), so bind explicitly
# to the :80 listener. CF terminates TLS at the edge.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: blog
  namespace: blog
spec:
  parentRefs:
    - name: backbone-gateway
      namespace: gateway-system
      sectionName: http
  hostnames:
    - blog.apinant.dev
  rules:
    - backendRefs:
        - name: blog
          port: 4321
