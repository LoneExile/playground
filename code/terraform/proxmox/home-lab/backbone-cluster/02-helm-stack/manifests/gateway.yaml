# Shared HTTP/HTTPS gateway for all web UIs. Single MetalLB IP, host-based
# routing. This file is a reference copy — the authoritative Gateway is
# created by gateway.tf (kubectl_manifest.backbone_gateway) in Terraform.
#
# Controller: Envoy Gateway (gatewayClassName: eg), not Cilium Gateway.
# Why: Cilium's Envoy config hard-codes a gRPC-Web filter that rejects
# Connect-RPC (Memos) with 505 regardless of appProtocol. Envoy Gateway
# applies that filter only to GRPCRoute, so HTTPRoute carries Connect-RPC
# cleanly.
#
# After the stack is up you'll see a LoadBalancer Service provisioned by
# Envoy Gateway in gateway-system ns, pinned to 10.0.10.212 via the
# EnvoyProxy parametersRef. UDM DNS and Cloudflare tunnel origins already
# point there.
#
# UDM Local DNS (recommended, works for all LAN clients):
#   Settings → Networks → Home → DNS → Add entries mapping each hostname → 10.0.10.212
#   Or use a wildcard if your UDM firmware supports it.

apiVersion: v1
kind: Namespace
metadata:
  name: gateway-system
---
# EnvoyProxy pins the LB IP for the Service that EG auto-provisions.
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyProxy
metadata:
  name: backbone-proxy
  namespace: gateway-system
spec:
  provider:
    type: Kubernetes
    kubernetes:
      envoyService:
        annotations:
          metallb.universe.tf/loadBalancerIPs: 10.0.10.212
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: backbone-gateway
  namespace: gateway-system
  annotations:
    # cert-manager watches this annotation and auto-issues/renews a Certificate
    # for each HTTPS listener hostname, storing it in the Secret named in
    # tls.certificateRefs. Start on -staging; flip to -prod after verification.
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  gatewayClassName: eg
  infrastructure:
    parametersRef:
      group: gateway.envoyproxy.io
      kind: EnvoyProxy
      name: backbone-proxy
  listeners:
    - name: http
      port: 80
      protocol: HTTP
      # Accept HTTPRoutes from any namespace. Homelab-simple; tighten per-app
      # with a namespaceSelector or ReferenceGrants if you want stricter control.
      allowedRoutes:
        namespaces:
          from: All
    # Wildcard HTTPS listener — cert-manager issues *.home.0dl.me via DNS-01.
    - name: https-wildcard
      port: 443
      protocol: HTTPS
      hostname: "*.home.0dl.me"
      tls:
        mode: Terminate
        certificateRefs:
          - name: wildcard-home-0dl-me-tls
      allowedRoutes:
        namespaces:
          from: All
