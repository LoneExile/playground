# Paperless-ngx — document archive. Restores the existing PostgreSQL 16 data
# dir and media tree from the previous cluster's NFS share so historic tags,
# correspondents, document types, and 74 already-OCR'd PDFs carry over.
#
# NFS layout reused (192.168.1.179:/zpool1/nfs_share):
#   config/paperless/consume     → /usr/src/paperless/consume    (1000:1000)
#   config/paperless/data        → /usr/src/paperless/data       (1000:1000)
#   config/paperless/db/data     → /var/lib/postgresql/data      (999:postgres)
#   config/paperless/export      → /usr/src/paperless/export     (1000:1000)
#   config/paperless/media       → /usr/src/paperless/media      (1000:1000)
#
# Stack: paperless + postgres-16 + redis + gotenberg + tika (5 deployments).
# GUI:   https://paperless.home.0dl.me   (LAN, wildcard cert)
#        https://paperless.0dl.me        (Cloudflare Tunnel — gate with CF Access)
#
# This manifest is rendered via templatefile() in apps.tf. Real values for
# $${paperless_db_password} and $${paperless_secret_key} come from sensitive
# variables in 02-helm-stack/variables.tf, populated from terraform.tfvars
# (gitignored at the parent level).
#
# DEPLOY STEPS:
#   1. Backup PGDATA before first deploy:
#        kubectl -n filebrowser exec deploy/filebrowser -- \
#          cp -a /srv/config/paperless/db/data \
#                /srv/config/paperless/db/data.pre-restore-$(date +%F)
#   2. Verify the paperless-ngx image tag below points to a current 2.x
#      release (defaults are not auto-updated by Renovate here).
#   3. Add paperless_db_password and paperless_secret_key to ../terraform.tfvars
#      (generate with: openssl rand -base64 64 for the secret_key).
#   4. terraform apply (from 02-helm-stack/).
#   5. Watch pods come up:
#        kubectl -n paperless get pods -w
#        kubectl -n paperless logs -f deploy/postgres
#        kubectl -n paperless logs -f deploy/paperless
#   6. PRE-FLIGHT — confirm role/database names inside the postgres pod:
#        kubectl -n paperless exec deploy/postgres -- psql -U postgres -c "\du"
#        kubectl -n paperless exec deploy/postgres -- psql -U postgres -c "\l"
#      If user/db are NOT named 'paperless', edit PAPERLESS_DBUSER / DBNAME
#      and the postStart ALTER USER target below before re-applying.
#   7. Login at https://paperless.home.0dl.me with the original admin password.
#      Forgotten? Reset:
#        kubectl -n paperless exec deploy/paperless -- python manage.py changepassword <username>
#   8. If "missing document" warnings show up (orphans from the lost
#      Sep-2025-to-Mar-2026 DB), re-discover them:
#        kubectl -n paperless exec deploy/paperless -- python manage.py document_index reindex
#   9. Cloudflare Access — configure BEFORE testing the tunnel route.
#      CF Zero Trust → Access → Applications → Add (Self-hosted) →
#        Domain: paperless.0dl.me → policy: email matches your address.

apiVersion: v1
kind: Namespace
metadata:
  name: paperless
  labels:
    # paperless-ngx image runs supervisord as root briefly before dropping to
    # PUID/PGID — same constraint as syncthing.
    pod-security.kubernetes.io/enforce: baseline
    pod-security.kubernetes.io/audit: baseline
    pod-security.kubernetes.io/warn: baseline
---
# Static PV — bind explicitly, no provisioner. Same pattern as syncthing-nas.
apiVersion: v1
kind: PersistentVolume
metadata:
  name: paperless-nas
spec:
  capacity: {storage: 15Ti}
  accessModes: [ReadWriteMany]
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  mountOptions: [nfsvers=4.1, nolock, noatime]
  nfs:
    server: 192.168.1.179
    path: /zpool1/nfs_share
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: paperless-nas
  namespace: paperless
spec:
  accessModes: [ReadWriteMany]
  storageClassName: ""
  volumeName: paperless-nas
  resources:
    requests: {storage: 15Ti}
---
# Secret — values rendered by templatefile() at terraform apply time.
# Both env names match the env vars they're consumed under.
apiVersion: v1
kind: Secret
metadata:
  name: paperless-secrets
  namespace: paperless
type: Opaque
stringData:
  PAPERLESS_DBPASS: "${paperless_db_password}"
  PAPERLESS_SECRET_KEY: "${paperless_secret_key}"
---
# Postgres 16 — restored data dir from NFS. The original 'paperless' role's
# password is unknown; the postStart hook re-asserts it via ALTER USER on
# every pod start using the always-trusted Unix socket.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: paperless
  labels: {app: postgres}
spec:
  replicas: 1
  strategy: {type: Recreate}     # PGDATA can't tolerate two writers
  selector:
    matchLabels: {app: postgres}
  template:
    metadata:
      labels: {app: postgres}
    spec:
      containers:
        - name: postgres
          image: postgres:16
          ports:
            - {name: postgres, containerPort: 5432}
          env:
            # Required by image entrypoint but ignored when PGDATA already
            # initialized (which it is, restored from NFS).
            - {name: POSTGRES_PASSWORD, value: "ignored-existing-pgdata"}
            - {name: PGDATA, value: /var/lib/postgresql/data}
            - name: PAPERLESS_DB_PASSWORD_DESIRED
              valueFrom:
                secretKeyRef: {name: paperless-secrets, key: PAPERLESS_DBPASS}
          volumeMounts:
            - {name: nas, mountPath: /var/lib/postgresql/data, subPath: config/paperless/db/data}
          resources:
            requests: {cpu: 100m, memory: 256Mi}
            limits:   {cpu: "1",  memory: 1Gi}
          # Idempotent password sync. The restored DB has 'paperless' as the
          # only superuser (no 'postgres' role); we trust-auth via local
          # socket as 'paperless' and ALTER our own password to match the
          # Secret. `|| true` keeps the pod up if the role were ever renamed.
          lifecycle:
            postStart:
              exec:
                command:
                  - sh
                  - -c
                  - |
                    for i in $(seq 1 30); do
                      pg_isready -h /var/run/postgresql -U paperless -d paperless && break
                      sleep 1
                    done
                    psql -h /var/run/postgresql -U paperless -d paperless \
                      -c "ALTER USER paperless WITH PASSWORD '$PAPERLESS_DB_PASSWORD_DESIRED';" \
                      || true
          readinessProbe:
            exec: {command: [pg_isready, -h, /var/run/postgresql, -U, paperless, -d, paperless]}
            initialDelaySeconds: 5
          livenessProbe:
            exec: {command: [pg_isready, -h, /var/run/postgresql, -U, paperless, -d, paperless]}
            initialDelaySeconds: 30
            periodSeconds: 30
      volumes:
        - name: nas
          persistentVolumeClaim:
            claimName: paperless-nas
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: paperless
  labels: {app: postgres}
spec:
  type: ClusterIP
  selector: {app: postgres}
  ports:
    - {name: postgres, port: 5432, targetPort: postgres}
---
# Redis — Celery broker. Ephemeral by design (queue, not state).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: paperless
  labels: {app: redis}
spec:
  replicas: 1
  selector:
    matchLabels: {app: redis}
  template:
    metadata:
      labels: {app: redis}
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - {name: redis, containerPort: 6379}
          volumeMounts:
            - {name: data, mountPath: /data}
          resources:
            requests: {cpu: 50m,  memory: 64Mi}
            limits:   {cpu: 500m, memory: 256Mi}
          readinessProbe:
            tcpSocket: {port: 6379}
            initialDelaySeconds: 2
          livenessProbe:
            tcpSocket: {port: 6379}
            initialDelaySeconds: 15
            periodSeconds: 30
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: paperless
  labels: {app: redis}
spec:
  type: ClusterIP
  selector: {app: redis}
  ports:
    - {name: redis, port: 6379, targetPort: redis}
---
# Gotenberg — Office/HTML → PDF conversion. Stateless.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gotenberg
  namespace: paperless
  labels: {app: gotenberg}
spec:
  replicas: 1
  selector:
    matchLabels: {app: gotenberg}
  template:
    metadata:
      labels: {app: gotenberg}
    spec:
      containers:
        - name: gotenberg
          image: gotenberg/gotenberg:8
          ports:
            - {name: http, containerPort: 3000}
          resources:
            requests: {cpu: 100m, memory: 256Mi}
            limits:   {cpu: "1",  memory: 512Mi}
          readinessProbe:
            httpGet: {path: /health, port: 3000}
            initialDelaySeconds: 5
          livenessProbe:
            httpGet: {path: /health, port: 3000}
            initialDelaySeconds: 30
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: gotenberg
  namespace: paperless
  labels: {app: gotenberg}
spec:
  type: ClusterIP
  selector: {app: gotenberg}
  ports:
    - {name: http, port: 3000, targetPort: http}
---
# Apache Tika — text/metadata extraction (Office, mail, etc.). Stateless.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tika
  namespace: paperless
  labels: {app: tika}
spec:
  replicas: 1
  selector:
    matchLabels: {app: tika}
  template:
    metadata:
      labels: {app: tika}
    spec:
      containers:
        - name: tika
          image: apache/tika:latest-full
          ports:
            - {name: http, containerPort: 9998}
          resources:
            requests: {cpu: 100m, memory: 512Mi}
            limits:   {cpu: "1",  memory: 1Gi}
          readinessProbe:
            httpGet: {path: /tika, port: 9998}
            initialDelaySeconds: 10
          livenessProbe:
            httpGet: {path: /tika, port: 9998}
            initialDelaySeconds: 30
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: tika
  namespace: paperless
  labels: {app: tika}
spec:
  type: ClusterIP
  selector: {app: tika}
  ports:
    - {name: http, port: 9998, targetPort: http}
---
# Paperless-ngx — web UI + Celery worker (single image, supervisord-managed).
# Pinned to 2.20.15 (current latest 2.x as of 2026-05-02). Bumping forward
# within the 2.x line is safe — Django migrations are forward-only but
# idempotent. Major-version moves are one-way; verify before changing.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: paperless
  namespace: paperless
  labels: {app: paperless}
spec:
  replicas: 1
  strategy: {type: Recreate}     # search index lives on NFS, can't tolerate two writers
  selector:
    matchLabels: {app: paperless}
  template:
    metadata:
      labels: {app: paperless}
    spec:
      # Disable legacy Docker-link service env vars. k8s would otherwise
      # inject PAPERLESS_PORT=tcp://<svc>:8000, which collides with the
      # paperless image's own PAPERLESS_PORT (granian bind port).
      enableServiceLinks: false
      containers:
        - name: paperless
          image: ghcr.io/paperless-ngx/paperless-ngx:2.20.15
          ports:
            - {name: http, containerPort: 8000}
          env:
            # Drop privileges to match the existing 1000:1000 NFS file ownership.
            - {name: PUID, value: "1000"}
            - {name: PGID, value: "1000"}
            - {name: TZ,   value: "Asia/Bangkok"}

            # Broker + DB wiring (in-namespace DNS).
            - {name: PAPERLESS_REDIS,   value: "redis://redis:6379"}
            - {name: PAPERLESS_DBHOST,  value: "postgres"}
            - {name: PAPERLESS_DBNAME,  value: "paperless"}
            - {name: PAPERLESS_DBUSER,  value: "paperless"}

            # Optional services.
            - {name: PAPERLESS_TIKA_ENABLED,           value: "1"}
            - {name: PAPERLESS_TIKA_GOTENBERG_ENDPOINT, value: "http://gotenberg:3000"}
            - {name: PAPERLESS_TIKA_ENDPOINT,          value: "http://tika:9998"}

            # OCR — curated world-common languages. Paperless downloads each
            # tesseract language pack at container start; this set adds ~15-20s
            # to first boot.
            - {name: PAPERLESS_OCR_LANGUAGES, value: "eng tha jpn chi_sim kor fra deu spa"}

            # Reverse-proxy / hostname plumbing — without these, login breaks
            # on CSRF / mixed-protocol redirects.
            - {name: PAPERLESS_URL,                  value: "https://paperless.home.0dl.me"}
            - {name: PAPERLESS_ALLOWED_HOSTS,        value: "paperless.home.0dl.me,paperless.0dl.me,localhost"}
            - {name: PAPERLESS_CSRF_TRUSTED_ORIGINS, value: "https://paperless.home.0dl.me,https://paperless.0dl.me"}
            - {name: PAPERLESS_USE_X_FORWARD_HOST,   value: "true"}
            # JSON array form is required from paperless-ngx 2.x onward —
            # the app does `tuple(json.loads(...))` on this env var.
            - {name: PAPERLESS_PROXY_SSL_HEADER,     value: '["HTTP_X_FORWARDED_PROTO","https"]'}

            # Secrets pulled from the templated Secret.
            - name: PAPERLESS_DBPASS
              valueFrom: {secretKeyRef: {name: paperless-secrets, key: PAPERLESS_DBPASS}}
            - name: PAPERLESS_SECRET_KEY
              valueFrom: {secretKeyRef: {name: paperless-secrets, key: PAPERLESS_SECRET_KEY}}
          volumeMounts:
            - {name: nas, mountPath: /usr/src/paperless/consume, subPath: config/paperless/consume}
            - {name: nas, mountPath: /usr/src/paperless/data,    subPath: config/paperless/data}
            - {name: nas, mountPath: /usr/src/paperless/export,  subPath: config/paperless/export}
            - {name: nas, mountPath: /usr/src/paperless/media,   subPath: config/paperless/media}
          resources:
            requests: {cpu: 200m, memory: 1Gi}
            limits:   {cpu: "2",  memory: 2Gi}
          # Paperless takes a while to migrate + load OCR packs on first start.
          # Probe-side httpHeaders.Host is required because Django's
          # ALLOWED_HOSTS rejects bare-pod-IP Host headers.
          startupProbe:
            httpGet:
              path: /
              port: 8000
              httpHeaders: [{name: Host, value: paperless.home.0dl.me}]
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 60       # ~10 min cap on first-boot migrations
          readinessProbe:
            httpGet:
              path: /
              port: 8000
              httpHeaders: [{name: Host, value: paperless.home.0dl.me}]
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /
              port: 8000
              httpHeaders: [{name: Host, value: paperless.home.0dl.me}]
            initialDelaySeconds: 120
            periodSeconds: 30
      volumes:
        - name: nas
          persistentVolumeClaim:
            claimName: paperless-nas
---
apiVersion: v1
kind: Service
metadata:
  name: paperless
  namespace: paperless
  labels: {app: paperless}
spec:
  type: ClusterIP
  selector: {app: paperless}
  ports:
    - {name: http, port: 8000, targetPort: http}
---
# LAN route — wildcard TLS via cert-manager on the gateway.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: paperless
  namespace: paperless
spec:
  parentRefs:
    - name: backbone-gateway
      namespace: gateway-system
  hostnames:
    - paperless.home.0dl.me
  rules:
    - backendRefs:
        - name: paperless
          port: 8000
---
# Tunnel route — bare paperless.0dl.me via Cloudflare Tunnel. HTTP-only at the
# k8s edge; CF terminates TLS and (per deploy step 9) gates auth via Access.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: paperless-tunnel
  namespace: paperless
spec:
  parentRefs:
    - name: backbone-gateway
      namespace: gateway-system
      sectionName: http
  hostnames:
    - paperless.0dl.me
  rules:
    - backendRefs:
        - name: paperless
          port: 8000
