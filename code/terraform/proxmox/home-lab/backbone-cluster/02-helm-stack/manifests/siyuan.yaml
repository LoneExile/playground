# SiYuan — self-hosted block-based PKM / notes app
# (https://github.com/siyuan-note/siyuan). Fresh install — no existing data.
#
# Workspace persists at /zpool1/nfs_share/config/siyuan/workspace/ (created on
# first start by the entrypoint chown step). Inside, the kernel populates
# conf/, data/, temp/, history/, repo/, plugins/.
#
# Image is pinned via sha256 digest because :v3.6.5 is mutable and we want
# reproducible rebuilds. Bump both the tag and the digest together when
# upgrading; the digest is the security guarantee, the tag is for humans.
#
# Why runAsUser: 0 — entrypoint.sh runs as root, chowns /opt/siyuan,
# /home/siyuan, and the workspace dir to PUID:PGID (default 1000:1000),
# then su-exec's down to that user before launching the kernel. Same pattern
# memos uses. PSA baseline allows this without privileged.
#
# Why --accessAuthCode is mandatory — since SiYuan v2.10.8 the kernel refuses
# to start without --accessAuthCode set. We pass it via an env var sourced
# from a Secret, then reference it in args using k8s env substitution
# ($(VAR_NAME) — note the parentheses, not braces — so it doesn't collide
# with Terraform templatefile $${...} syntax).
#
# Single replica + Recreate strategy: SiYuan stores data in embedded SQLite
# inside the workspace; concurrent writers on NFS would corrupt the WAL.
#
# Exposure: LAN via *.home.0dl.me wildcard cert + bare 0dl.me via Cloudflare
# Tunnel (HTTP-only, TLS terminated at the CF edge). Same shape as memos and
# trilium.
#
# Post-apply manual follow-ups (Cloudflare side, can't be terraformed here):
#   1. Cloudflare DNS: add CNAME `siyuan.0dl.me` → `<tunnel-id>.cfargotunnel.com`
#      (look up the tunnel ID jellyfin/memos/trilium already use).
#   2. Cloudflare Tunnel "Published application routes" UI:
#        Subdomain: siyuan / Domain: 0dl.me / Path: empty (match all paths)
#        Service: HTTP → 10.0.10.212  (gateway external IP)
#      The empty Path is critical — see the immich incident where a leftover
#      `^/blog` regex blocked everything but /blog requests.
#   3. Open https://siyuan.home.0dl.me, enter the auth code from
#      terraform.tfvars (or 1Password), complete the onboarding wizard.

apiVersion: v1
kind: Namespace
metadata:
  name: siyuan
  labels:
    pod-security.kubernetes.io/enforce: baseline
    pod-security.kubernetes.io/audit: baseline
    pod-security.kubernetes.io/warn: baseline
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: siyuan-nas
spec:
  capacity: {storage: 15Ti}
  accessModes: [ReadWriteMany]
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  mountOptions: [nfsvers=4.1, nolock, noatime]
  nfs:
    server: 192.168.1.179
    path: /zpool1/nfs_share
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: siyuan-nas
  namespace: siyuan
spec:
  accessModes: [ReadWriteMany]
  storageClassName: ""
  volumeName: siyuan-nas
  resources:
    requests: {storage: 15Ti}
---
apiVersion: v1
kind: Secret
metadata:
  name: siyuan-secrets
  namespace: siyuan
type: Opaque
stringData:
  access-auth-code: "${siyuan_access_auth_code}"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: siyuan
  namespace: siyuan
  labels: {app: siyuan}
spec:
  replicas: 1
  strategy: {type: Recreate}    # sqlite on NFS — concurrent writers corrupt WAL
  selector:
    matchLabels: {app: siyuan}
  template:
    metadata:
      labels: {app: siyuan}
    spec:
      securityContext:
        runAsUser: 0
        runAsGroup: 0
      containers:
        - name: siyuan
          image: b3log/siyuan:v3.6.5@sha256:1a316554bfbf0c951ddabc7d3cb0292620152b44c087b6979d5d9b6bae065b1b
          args:
            - "/opt/siyuan/kernel"
            - "--workspace=/siyuan/workspace"
            - "--accessAuthCode=$(SIYUAN_ACCESS_AUTH_CODE)"
          ports:
            - {name: http, containerPort: 6806}
          env:
            - {name: TZ, value: Asia/Bangkok}
            - name: SIYUAN_ACCESS_AUTH_CODE
              valueFrom:
                secretKeyRef:
                  name: siyuan-secrets
                  key: access-auth-code
          resources:
            requests: {cpu: 100m, memory: 256Mi}
            limits:   {cpu: 2, memory: 2Gi}
          volumeMounts:
            - {name: nas, mountPath: /siyuan/workspace, subPath: config/siyuan/workspace}
          # tcpSocket probes — SiYuan returns HTTP 401 on every path when
          # --accessAuthCode is set, so an httpGet probe would fail readiness
          # forever. TCP-level check is enough: the kernel is single-process
          # and the HTTP listener implies the kernel is healthy. Same approach
          # memos uses.
          readinessProbe:
            tcpSocket: {port: 6806}
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket: {port: 6806}
            initialDelaySeconds: 60
            periodSeconds: 30
      volumes:
        - name: nas
          persistentVolumeClaim:
            claimName: siyuan-nas
---
apiVersion: v1
kind: Service
metadata:
  name: siyuan
  namespace: siyuan
  labels: {app: siyuan}
spec:
  type: ClusterIP
  selector: {app: siyuan}
  ports:
    - {name: http, port: 6806, targetPort: http}
---
# LAN route — TLS terminated at the gateway via the *.home.0dl.me wildcard.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: siyuan
  namespace: siyuan
spec:
  parentRefs:
    - name: backbone-gateway
      namespace: gateway-system
  hostnames:
    - siyuan.home.0dl.me
  rules:
    - backendRefs:
        - name: siyuan
          port: 6806
---
# Tunnel route — bare siyuan.0dl.me via Cloudflare Tunnel. HTTP-only at the
# gateway (CF terminates TLS at the edge), so bind to the :http listener.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: siyuan-tunnel
  namespace: siyuan
spec:
  parentRefs:
    - name: backbone-gateway
      namespace: gateway-system
      sectionName: http
  hostnames:
    - siyuan.0dl.me
  rules:
    - backendRefs:
        - name: siyuan
          port: 6806
