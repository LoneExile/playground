# Filebrowser — web UI that mounts the ROOT of the NFS share (like the old
# setup), so you can browse everything on the NAS including historic PVC data
# from previous clusters.
#
# Uses a static PV pointing at 192.168.1.179:/zpool1/nfs_share (NOT the dynamic
# provisioner — that would only expose a subdir).
#
# Apply:
#   kubectl apply -f filebrowser.yaml
#   kubectl -n filebrowser get svc   # EXTERNAL-IP from MetalLB
#
# Default login: admin / admin — change on first login.
# WARNING: this gives full read/write to every PVC on the NAS. Keep it
# internal-only; don't expose past the Gateway.

apiVersion: v1
kind: Namespace
metadata:
  name: filebrowser
  labels:
    pod-security.kubernetes.io/enforce: baseline
    pod-security.kubernetes.io/audit: baseline
    pod-security.kubernetes.io/warn: baseline
---
# Static PV — bypasses the dynamic provisioner so we can reach the share root.
apiVersion: v1
kind: PersistentVolume
metadata:
  name: nas-root
  labels:
    share: nas-root
spec:
  capacity:
    storage: 15Ti
  accessModes: [ReadWriteMany]
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""     # bind explicitly, not via a StorageClass
  mountOptions:
    - nfsvers=4.1
    - nolock
    - noatime
  nfs:
    server: 192.168.1.179
    path: /zpool1/nfs_share
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nas-root
  namespace: filebrowser
spec:
  accessModes: [ReadWriteMany]
  resources:
    requests:
      storage: 15Ti
  storageClassName: ""
  volumeName: nas-root    # binds to the PV above, same name
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: filebrowser
  namespace: filebrowser
  labels: {app: filebrowser}
spec:
  replicas: 1
  selector:
    matchLabels: {app: filebrowser}
  template:
    metadata:
      labels: {app: filebrowser}
    spec:
      containers:
        - name: filebrowser
          image: filebrowser/filebrowser:v2.31.2
          # Default DB path is /database.db (a file at /), but we mount the NFS
          # subPath as a *directory* at /database. Point -d at a file inside
          # that directory so the DB actually persists across pod restarts.
          args: ["-d", "/database/filebrowser.db"]
          ports:
            - {name: http, containerPort: 80}
          securityContext:
            runAsUser: 0
            runAsGroup: 0
          volumeMounts:
            # DB lives on the share too so it survives pod restarts.
            # Using a hidden dir keeps it out of the /srv browse view.
            - name: nas
              mountPath: /database
              subPath: .filebrowser-db
            # /srv is the browse root — mounts the whole share, no subPath.
            - name: nas
              mountPath: /srv
          resources:
            requests: {cpu: 20m, memory: 64Mi}
            limits:   {cpu: 500m, memory: 256Mi}
          readinessProbe:
            httpGet: {path: /health, port: 80}
            initialDelaySeconds: 5
          livenessProbe:
            httpGet: {path: /health, port: 80}
            initialDelaySeconds: 30
      volumes:
        - name: nas
          persistentVolumeClaim:
            claimName: nas-root
---
apiVersion: v1
kind: Service
metadata:
  name: filebrowser
  namespace: filebrowser
  labels: {app: filebrowser}
spec:
  # Routed via backbone-gateway — https://files.home.0dl.me
  type: ClusterIP
  selector: {app: filebrowser}
  ports:
    - {name: http, port: 80, targetPort: http}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: filebrowser
  namespace: filebrowser
spec:
  parentRefs:
    - name: backbone-gateway
      namespace: gateway-system
  hostnames:
    - files.home.0dl.me
  rules:
    - backendRefs:
        - name: filebrowser
          port: 80
---
# Tunnel route — bare files.0dl.me via Cloudflare Tunnel. HTTP-only (the
# wildcard cert covers *.home.0dl.me, not the apex-level hostname), so bind
# explicitly to the :80 listener. CF terminates TLS at the edge.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: filebrowser-tunnel
  namespace: filebrowser
spec:
  parentRefs:
    - name: backbone-gateway
      namespace: gateway-system
      sectionName: http
  hostnames:
    - files.0dl.me
  rules:
    - backendRefs:
        - name: filebrowser
          port: 80
