# Dashy (https://dashy.to) — self-hosted homelab dashboard. Brings back the
# previous deployment from cookbook/kubernetes/0-playbooks/pack-3-nfs/dashy.yaml.
#
# Existing user-data carries over from the old cluster:
#   /zpool1/nfs_share/config/dashy/user-data/  (conf.yml, item-icons, etc.)
# Dashy reads /app/user-data/conf.yml at startup; edits via the in-app editor
# are written back to the same path.
#
# Image is tracked via :latest and pinned by bump-image-tags.sh (Lissy93/dashy
# uses GitHub Releases). Run `./bump-image-tags.sh dashy` to refresh.
#
# Exposure: LAN via *.home.0dl.me wildcard cert + bare 0dl.me via Cloudflare
# Tunnel (HTTP-only, TLS terminated at the CF edge). Same shape as trilium.
#
# Post-apply manual follow-ups (Cloudflare side, can't be terraformed here):
#   1. Cloudflare DNS: add CNAME `dashy.0dl.me` → `<tunnel-id>.cfargotunnel.com`
#      (look up the tunnel ID jellyfin/memos/trilium/siyuan already use).
#   2. Cloudflare Tunnel "Published application routes" UI:
#        Subdomain: dashy / Domain: 0dl.me / Path: empty (match all paths)
#        Service: HTTP → 10.0.10.212  (gateway external IP)
#      The empty Path is critical — see the immich incident where a leftover
#      `^/blog` regex blocked everything but /blog requests.

apiVersion: v1
kind: Namespace
metadata:
  name: dashy
  labels:
    pod-security.kubernetes.io/enforce: baseline
    pod-security.kubernetes.io/audit: baseline
    pod-security.kubernetes.io/warn: baseline
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: dashy-nas
spec:
  capacity: {storage: 15Ti}
  accessModes: [ReadWriteMany]
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  mountOptions: [nfsvers=4.1, nolock, noatime]
  nfs:
    server: 192.168.1.179
    path: /zpool1/nfs_share
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: dashy-nas
  namespace: dashy
spec:
  accessModes: [ReadWriteMany]
  storageClassName: ""
  volumeName: dashy-nas
  resources:
    requests: {storage: 15Ti}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashy
  namespace: dashy
  labels: {app: dashy}
spec:
  replicas: 1
  selector:
    matchLabels: {app: dashy}
  template:
    metadata:
      labels: {app: dashy}
    spec:
      containers:
        - name: dashy
          image: lissy93/dashy:latest
          ports:
            - {name: http, containerPort: 8080}
          env:
            - {name: TZ, value: Asia/Bangkok}
          resources:
            requests: {cpu: 50m, memory: 128Mi}
            limits:   {cpu: 1, memory: 512Mi}
          volumeMounts:
            - {name: nas, mountPath: /app/user-data, subPath: config/dashy/user-data}
          readinessProbe:
            httpGet: {path: /, port: 8080}
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet: {path: /, port: 8080}
            initialDelaySeconds: 60
            periodSeconds: 30
      volumes:
        - name: nas
          persistentVolumeClaim:
            claimName: dashy-nas
---
apiVersion: v1
kind: Service
metadata:
  name: dashy
  namespace: dashy
  labels: {app: dashy}
spec:
  type: ClusterIP
  selector: {app: dashy}
  ports:
    - {name: http, port: 8080, targetPort: http}
---
# LAN route — TLS terminated at the gateway via the *.home.0dl.me wildcard.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: dashy
  namespace: dashy
spec:
  parentRefs:
    - name: backbone-gateway
      namespace: gateway-system
  hostnames:
    - dashy.home.0dl.me
  rules:
    - backendRefs:
        - name: dashy
          port: 8080
---
# Tunnel route — bare dashy.0dl.me via Cloudflare Tunnel. HTTP-only at the
# gateway (CF terminates TLS at the edge), so bind to the :http listener.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: dashy-tunnel
  namespace: dashy
spec:
  parentRefs:
    - name: backbone-gateway
      namespace: gateway-system
      sectionName: http
  hostnames:
    - dashy.0dl.me
  rules:
    - backendRefs:
        - name: dashy
          port: 8080
